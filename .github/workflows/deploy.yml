name: Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install statt ci: Windows-generiertes Lockfile lässt Linux-Optionals aus
      - run: npm install --no-audit --no-fund
      - name: Unit- & Balance-Tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          BUILD_VERSION: ${{ github.sha }}
      - name: Version-Stempel (SW-Cache-Bust + version.json für Update-Banner)
        run: |
          sed -i "s/__BUILD__/${GITHUB_SHA::8}/" dist/sw.js
          V="$(node -p "require('./package.json').version")+${GITHUB_SHA::8}"
          echo "{\"version\":\"$V\"}" > dist/version.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
