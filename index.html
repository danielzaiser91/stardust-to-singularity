<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#050510" />
  <meta name="description" content="Stardust to Singularity — a 3D incremental game. From a mote of dust to the singularity." />
  <title>Stardust to Singularity</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    /* Kritisches CSS inline, Rest in style.css */
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050510; }
    #app { position: fixed; inset: 0; }
    #gl { position: absolute; inset: 0; touch-action: none; }
    #loading {
      position: absolute; inset: 0; display: flex; flex-direction: column; gap: 16px;
      align-items: center; justify-content: center; color: #7fd4ff; z-index: 100;
      font-family: 'Segoe UI', system-ui, sans-serif; background: #050510;
      transition: opacity .8s;
    }
    #loading .orb { width: 14px; height: 14px; border-radius: 50%; background: #7fd4ff;
      box-shadow: 0 0 24px 6px #7fd4ff88; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 50% { transform: scale(1.6); opacity: .6; } }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gl"></canvas>
    <div id="ui"></div>
    <div id="loading"><div class="orb"></div><div>condensing stardust…</div></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
